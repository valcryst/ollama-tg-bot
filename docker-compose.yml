services:
  bot:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?Set BOT_TOKEN}
      NODE_ENV: production
      PORT: ${PORT:-3000}
    volumes:
      - bot-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  bot-data:
