services:
  bot:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    networks:
      - traefik
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?Set BOT_TOKEN}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      VRAM_AVAILABLE: ${VRAM_AVAILABLE:?Set VRAM_AVAILABLE}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-}
      NODE_ENV: production
      PORT: ${PORT:-3000}
    volumes:
      - bot-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-proxy}"
      - "traefik.http.routers.llm-tg-bot.rule=Host(`${TRAEFIK_HOST:-llm-tg-bot.example.com}`)"
      - "traefik.http.routers.llm-tg-bot.entrypoints=websecure"
      - "traefik.http.routers.llm-tg-bot.tls=true"
      - "traefik.http.routers.llm-tg-bot.tls.certresolver=cloudflare"
      - "traefik.http.services.llm-tg-bot.loadbalancer.server.port=${TRAEFIK_SERVICE_PORT:-3000}"

      - "homepage.group=${HOMEPAGE_GROUP:-AI}"
      - "homepage.name=LLM TG Bot"
      - "homepage.icon="
      - "homepage.href=https://${TRAEFIK_HOST:-llm-tg-bot.example.com}"

volumes:
  bot-data:

networks:
  traefik:
    external: true
    name: "${TRAEFIK_DOCKER_NETWORK:-proxy}"